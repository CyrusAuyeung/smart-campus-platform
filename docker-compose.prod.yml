services:
  web:
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"

  api:
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"

  db:
    restart: unless-stopped
    ports: []

  redis:
    restart: unless-stopped
    ports: []

  mq:
    restart: unless-stopped
    ports:
      - "127.0.0.1:15672:15672"
      - "127.0.0.1:5672:5672"

  prometheus:
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
