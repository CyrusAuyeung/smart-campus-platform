services:
  web:
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"

  api:
    restart: unless-stopped
    ports:
      - "127.0.0.1:18081:8080"

  db:
    restart: unless-stopped
    ports: []

  redis:
    restart: unless-stopped
    ports: []

  mq:
    restart: unless-stopped
    ports:
      - "127.0.0.1:15673:15672"
      - "127.0.0.1:5673:5672"

  prometheus:
    restart: unless-stopped
    ports: []

  grafana:
    restart: unless-stopped
    ports:
      - "127.0.0.1:3101:3000"
